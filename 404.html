<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found</title>
<link rel="icon" href="404.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #050a0e;
      color: #d1d1d1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 20px;
    }

    .code {
      font-size: 72px;
      font-weight: 700;
      color: #23ff7a;
      margin-bottom: 10px;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #b6f7c8;
    }

    .text {
      font-size: 14px;
      color: #9aa7a0;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: rgba(35, 255, 122, 0.1);
      border: 1px solid rgba(35, 255, 122, 0.4);
      color: #23ff7a;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.2s;
    }

    .btn:hover {
      background: rgba(35, 255, 122, 0.2);
      transform: translateY(-2px);
    }

    .hint {
      margin-top: 15px;
      font-size: 12px;
      color: #5f6b66;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="code">404</div>
    <div class="title">Page not found</div>
    <div class="text">
      OOPS! This page could not be found. Please return via the buttons below!</div>

    <a class="btn" href="https://www.stanzdev.uk/">Portfolio</a>
    <a class="btn" href="https://veri.stanzdev.uk/">Veri.</a>

    <div class="hint">&copy; Stanzdev • Route Error</div>
  </div>

</body>
</html>
